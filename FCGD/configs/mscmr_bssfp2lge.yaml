# ──────────────────────────────────────────────────────────────────────────────
# FCGD Configuration: MS-CMRSeg  bSSFP → LGE
# ──────────────────────────────────────────────────────────────────────────────
experiment:
  name: "fcgd_mscmr_bssfp2lge"
  seed: 42

dataset:
  name: "mscmr"
  root: "/data/MSCMRSeg"
  source_modality: "bSSFP"
  target_modality: "LGE"
  img_size: 256
  batch_size: 4
  num_workers: 4
  num_classes: 4               # 0=BG, 1=RVC, 2=MYO, 3=LVC
  class_names: ["RVC", "MYO", "LVC"]

model:
  in_channels: 1
  num_classes: 4
  img_size: 256
  enc_channels: [32, 64, 128, 256]
  num_nodes: 256
  gnn_layers: 3
  gnn_hidden_dim: 256
  freq_dim: 128
  diff_timesteps: 10
  mc_samples: 10

training:
  epochs: 200
  lr_seg: 1.0e-4
  lr_disc: 1.0e-4
  lr_diff: 5.0e-5
  weight_decay: 1.0e-5
  lambda_str: 0.1
  mu_adv: 0.01
  grad_clip: 1.0
  amp: true
  finetune_diff: false
  pretrain_diff_epochs: 10
  val_every: 5
  save_every: 10

output:
  dir: "outputs/fcgd_mscmr_bssfp2lge"
